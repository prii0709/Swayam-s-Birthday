<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Your Gift ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:#000;
color:white;

height:100vh;

display:flex;
justify-content:center;
align-items:center;

overflow:hidden;

position:relative;

}

/* GOLD GLOW */

.glow{

position:absolute;

width:700px;
height:700px;

background:#d4af37;

border-radius:50%;

filter:blur(250px);

opacity:.08;

animation:moveGlow 10s ease-in-out infinite;

}

@keyframes moveGlow{

0%{
transform:translate(-150px,-100px);
}

50%{
transform:translate(150px,100px);
}

100%{
transform:translate(-150px,-100px);
}

}

/* CONTENT */

.container{

text-align:center;

width:90%;
max-width:900px;

position:relative;
z-index:5;

animation:fadeUp 1.5s ease;

}

.gift-box{

width:180px;

margin-bottom:40px;

animation:floatGift 4s ease-in-out infinite;

}

@keyframes floatGift{

0%,100%{
transform:translateY(0);
}

50%{
transform:translateY(-12px);
}

}

.message{

font-size:2rem;

font-weight:300;

line-height:1.8;

}

.message span{

color:#d4af37;

font-weight:500;

}

/* ACCESS TEXT */

.access-text{

margin-top:40px;

margin-bottom:20px;

font-size:1rem;

color:#d4af37;

letter-spacing:2px;

line-height:1.8;

}

/* BUTTON */

.btn{

padding:18px 40px;

background:#d4af37;

color:#000;

border:none;

border-radius:15px;

cursor:pointer;

font-weight:700;

font-size:1rem;

transition:.4s;

}

.btn:hover{

transform:translateY(-5px);

box-shadow:
0 0 30px rgba(212,175,55,.4);

}

/* ANIMATION */

@keyframes fadeUp{

from{
opacity:0;
transform:translateY(30px);
}

to{
opacity:1;
transform:translateY(0);
}

}

/* MOBILE */

@media(max-width:768px){

.gift-box{
width:130px;
}

.message{
font-size:1.4rem;
}

.access-text{
font-size:.9rem;
}

.btn{
padding:15px 28px;
font-size:.9rem;
}

}

</style>

</head>

<body>

<div class="glow"></div>

<div class="container">

<img
src="images/gift.png"
alt="Gift"
class="gift-box">

<div class="message">

    <p>Not every gift comes in a box.</p>
    
    <p>Some arrive as memories.</p>
    
    <p>Some arrive as people.</p>
    
    <p>And somehow...</p>
    
    <p class="highlight">I got both. ❤️</p>
    
</div>

<div class="access-text">

But first...<br>

let's see if you're authorized to continue.

</div>

<button
class="btn"
onclick="location.href='vault.html'">

BUT... DO YOU HAVE ACCESS? 👀

</button>

</div>

</body>

</html>
