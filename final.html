<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Final Letter ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:#000;

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;
flex-direction:column;

padding:40px;

overflow-x:hidden;

position:relative;

}

/* GOLD PARTICLES */

body::before{

content:'';

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background-image:
radial-gradient(#d4af37 1px, transparent 1px);

background-size:80px 80px;

opacity:.05;

animation:stars 25s linear infinite;

pointer-events:none;

}

@keyframes stars{

from{
transform:translateY(0);
}

to{
transform:translateY(100px);
}

}

/* LETTER IMAGE */

.letter{

width:900px;
max-width:95%;

border-radius:12px;

box-shadow:
0 0 60px rgba(212,175,55,.15);

animation:
fadeIn 2s ease;

}

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(30px);
}

to{
opacity:1;
transform:translateY(0);
}

}

/* END TEXT */

.end{

margin-top:30px;

color:#d4af37;

font-size:1rem;

letter-spacing:3px;

text-align:center;

opacity:.85;

animation:
fadeIn 3s ease;

}

@media(max-width:768px){

.end{
font-size:.85rem;
}

}

</style>

</head>

<body>

<img
src="images/letter-bg.png"
alt="Final Letter"
class="letter">

<div class="end">

Love you soo much ❤️

</div>

</body>

</html>
